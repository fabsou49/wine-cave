# docker-compose pour Synology NAS
# Utilise l'image pré-construite depuis GitHub Container Registry

services:
  cave:
    image: ghcr.io/fabsou49/wine-cave:latest
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=300        # vérifie toutes les 5 minutes
      - WATCHTOWER_CLEANUP=true             # supprime les anciennes images
      - WATCHTOWER_INCLUDE_STOPPED=false
    restart: unless-stopped
