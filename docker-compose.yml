services:
  cave:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY est requis}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD est requis}
    restart: unless-stopped
